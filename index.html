<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Dino Runner PRO</title>
<style>
  body { margin:0; background:#0f172a; color:white; font-family:sans-serif; text-align:center; }
  canvas { background:linear-gradient(#1e293b,#020617); display:block; margin:0 auto; border-radius:10px; }
  button { margin:5px; padding:10px 15px; border:none; border-radius:8px; background:#22c55e; color:white; cursor:pointer; }
</style>
</head>
<body>
<h2>Ultimate Dino Runner PRO 🦖</h2>
<div id="menu">
  <button onclick="startGame()">Play</button>
  <button onclick="openShop()">Shop</button>
</div>
<div id="shop" style="display:none;">
  <h3>Shop (Coins)</h3>
  <button onclick="buySkin('green',0)">Green (Free)</button>
  <button onclick="buySkin('blue',200)">Blue (200)</button>
  <button onclick="buySkin('red',300)">Red (300)</button>
  <button onclick="buySkin('gold',500)">Gold (500)</button>
  <button onclick="buySkin('purple',700)">Purple (700)</button>
  <button onclick="buySkin('rainbow',1000)">Rainbow (1000)</button>
  <br><button onclick="closeShop()">Back</button>
</div>
<canvas id="game" width="800" height="300" style="display:none;"></canvas>
<p>SPACE = Jump | P = Pause</p>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let player, obstacles, birds, coinsArr;
let score, speed, paused, gameRunning;
let coins = parseInt(localStorage.getItem('coins')) || 0;
let skin = localStorage.getItem('skin') || 'green';
let owned = JSON.parse(localStorage.getItem('owned')) || ['green'];

function resetGame(){
  player={x:50,y:220,w:40,h:40,vy:0,jumping:false};
  obstacles=[]; birds=[]; coinsArr=[];
  score=0; speed=6; paused=false; gameRunning=true;
}

function startGame(){
  document.getElementById('menu').style.display='none';
  canvas.style.display='block';
  resetGame();
  loop();
}

function openShop(){document.getElementById('menu').style.display='none';document.getElementById('shop').style.display='block';}
function closeShop(){document.getElementById('shop').style.display='none';document.getElementById('menu').style.display='block';}

function buySkin(color,price){
  if(!owned.includes(color)){
    if(coins>=price){
      coins-=price;
      owned.push(color);
      localStorage.setItem('coins',coins);
      localStorage.setItem('owned',JSON.stringify(owned));
      alert('Bought '+color);
    } else { alert('Not enough coins'); return; }
  }
  skin=color;
  localStorage.setItem('skin',color);
}

setInterval(()=>obstacles.push({x:800,y:240,w:20,h:40}),1500);
setInterval(()=>birds.push({x:800,y:180,w:30,h:20}),3000);
setInterval(()=>coinsArr.push({x:800,y:200,w:15,h:15}),2000);

function update(){
  if(paused) return;

  player.vy+=0.8; player.y+=player.vy;
  if(player.y>220){player.y=220; player.jumping=false;}

  obstacles.forEach(o=>o.x-=speed);
  birds.forEach(b=>b.x-=speed+2);
  coinsArr.forEach(c=>c.x-=speed);

  obstacles=obstacles.filter(o=>o.x>-20);
  birds=birds.filter(b=>b.x>-20);
  coinsArr=coinsArr.filter(c=>c.x>-20);

  [...obstacles,...birds].forEach(o=>{
    if(player.x<o.x+o.w && player.x+player.w>o.x && player.y<o.y+o.h && player.y+player.h>o.y){
      coins+=Math.floor(score/10);
      localStorage.setItem('coins',coins);
      alert('Game Over! Coins earned: '+Math.floor(score/10));
      location.reload();
    }
  });

  coinsArr.forEach((c,i)=>{
    if(player.x<c.x+c.w && player.x+player.w>c.x && player.y<c.y+c.h && player.y+player.h>c.y){
      coins+=5;
      coinsArr.splice(i,1);
      localStorage.setItem('coins',coins);
    }
  });

  score++; if(score%200===0) speed++;
}

function drawDino(){
  if(skin==='rainbow'){
    ctx.fillStyle=`hsl(${Date.now()/10%360},100%,50%)`;
  } else { ctx.fillStyle=skin; }
  ctx.fillRect(player.x,player.y,player.w,player.h);
  ctx.fillStyle='black'; ctx.fillRect(player.x+25,player.y+10,5,5);
}

function draw(){
  ctx.clearRect(0,0,800,300);

  ctx.fillStyle='#444'; ctx.fillRect(0,260,800,5);

  drawDino();

  ctx.fillStyle='red'; obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));
  ctx.fillStyle='orange'; birds.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));
  ctx.fillStyle='yellow'; coinsArr.forEach(c=>ctx.fillRect(c.x,c.y,c.w,c.h));

  ctx.fillStyle='white';
  ctx.fillText('Score: '+score,10,20);
  ctx.fillText('Coins: '+coins,10,40);

  if(paused) ctx.fillText('PAUSED',350,150);
}

function loop(){ if(!gameRunning) return; update(); draw(); requestAnimationFrame(loop);} 

window.addEventListener('keydown',e=>{
  if(e.code==='Space' && !player.jumping){player.vy=-12; player.jumping=true;}
  if(e.code==='KeyP'){paused=!paused;}
});
</script>
</body>
</html>
